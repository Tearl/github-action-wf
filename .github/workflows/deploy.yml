name: Deploy to AWS S3

# 触发条件：推送到 main 分支时自动运行
on:
  push:
    branches: [ main ]

# 关键权限：OIDC 必须要 id-token: write
permissions:
  id-token: write      # 允许申请 OIDC token（换取 AWS 临时凭证）
  contents: read       # 允许读取仓库代码

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1) 拉取仓库代码
      - name: Checkout code
        uses: actions/checkout@v4

      # 2) 用 IAM Role 换取临时 AWS 凭证（核心步骤）
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::496251221975:role/github-actions-deploy-role
          aws-region: us-east-1        # 换成你的区域

      # 3) （可选）安装依赖并构建项目
      - name: Build
        run: |
          npm ci
          npm run build

      # 4) 部署：把构建产物同步到 S3
      - name: Deploy to S3
        run: aws s3 sync ./dist s3://amzn-s3-github-action --delete